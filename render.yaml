# Blueprint-only: env vars here apply if you deploy via "Blueprint" from this file.
# If you created the Web Service manually, set PYTHON_VERSION=3.11.10 in the dashboard
# (Environment) — otherwise Render defaults to Python 3.14 and pydantic-core will fail to build.
services:
  - type: web
    name: wort-backend
    runtime: python
    buildCommand: pip install -r server/render_requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
