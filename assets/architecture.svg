<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
      .node-title { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; }
      .node-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.08em; opacity: 0.5; }
      .section-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="820" rx="2" fill="#F7F7F5"/>

  <!-- Subtle grid overlay -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#3A3A38" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="900" height="820" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="44" fill="#1A3C2B"/>
  <text x="32" y="27" class="label" fill="#9EFFBF" font-size="10" letter-spacing="0.2em">SYSTEM ARCHITECTURE</text>
  <text x="868" y="27" class="label" fill="#F7F7F5" opacity="0.35" font-size="9" text-anchor="end">WORT</text>

  <!-- ═══════════════ ROUTER ═══════════════ -->
  <rect x="345" y="72" width="210" height="48" rx="1" fill="#1A3C2B"/>
  <text x="450" y="100" class="node-title" fill="#F7F7F5" text-anchor="middle">Router Node</text>

  <!-- Router to 3 branches - lines -->
  <line x1="400" y1="120" x2="145" y2="170" stroke="#3A3A38" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="120" x2="450" y2="170" stroke="#3A3A38" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="120" x2="755" y2="170" stroke="#3A3A38" stroke-width="1" opacity="0.3"/>

  <!-- Branch dots -->
  <circle cx="145" cy="170" r="3" fill="#9EFFBF"/>
  <circle cx="450" cy="170" r="3" fill="#F4D35E"/>
  <circle cx="755" cy="170" r="3" fill="#FF8C69"/>

  <!-- ═══════════════ LEFT BRANCH: WEBSEARCH ═══════════════ -->
  <rect x="50" y="182" width="190" height="44" rx="1" fill="#F7F7F5" stroke="#3A3A38" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="50" y="182" width="4" height="44" rx="1" fill="#9EFFBF"/>
  <text x="145" y="200" class="section-label" fill="#1A3C2B" opacity="0.4" text-anchor="middle">01 · FAST INTEL</text>
  <text x="145" y="216" class="node-title" fill="#1A3C2B" text-anchor="middle">Web Search Agent</text>

  <!-- Websearch down line -->
  <line x1="145" y1="226" x2="145" y2="690" stroke="#3A3A38" stroke-width="1" opacity="0.15" stroke-dasharray="4 4"/>

  <!-- ═══════════════ CENTER BRANCH: DEEP RESEARCH ═══════════════ -->

  <!-- Clarification -->
  <rect x="330" y="182" width="240" height="44" rx="1" fill="#F7F7F5" stroke="#3A3A38" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="330" y="182" width="4" height="44" rx="1" fill="#F4D35E"/>
  <text x="450" y="200" class="section-label" fill="#1A3C2B" opacity="0.4" text-anchor="middle">UNDERSTAND INTENT</text>
  <text x="450" y="216" class="node-title" fill="#1A3C2B" text-anchor="middle">Clarification Loop</text>

  <!-- Loop arrow on clarification -->
  <path d="M 570 195 Q 590 195 590 204 Q 590 213 570 213" stroke="#F4D35E" stroke-width="1" fill="none" opacity="0.6"/>
  <polygon points="572,210 568,216 576,216" fill="#F4D35E" opacity="0.6"/>
  <text x="600" y="207" class="node-sub" fill="#1A3C2B">×3 max</text>

  <!-- Clarification to Planner -->
  <line x1="450" y1="226" x2="450" y2="264" stroke="#3A3A38" stroke-width="1" opacity="0.2"/>
  <circle cx="450" cy="264" r="2.5" fill="#3A3A38" opacity="0.3"/>

  <!-- Planner -->
  <rect x="330" y="274" width="240" height="44" rx="1" fill="#F7F7F5" stroke="#3A3A38" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="330" y="274" width="4" height="44" rx="1" fill="#F4D35E"/>
  <text x="450" y="292" class="section-label" fill="#1A3C2B" opacity="0.4" text-anchor="middle">DECOMPOSE QUERY</text>
  <text x="450" y="308" class="node-title" fill="#1A3C2B" text-anchor="middle">Planner Node</text>

  <!-- Planner to Human Review -->
  <line x1="450" y1="318" x2="450" y2="356" stroke="#3A3A38" stroke-width="1" opacity="0.2"/>
  <circle cx="450" cy="356" r="2.5" fill="#3A3A38" opacity="0.3"/>

  <!-- Human Review (HITL) — special treatment -->
  <rect x="330" y="366" width="240" height="50" rx="1" fill="#1A3C2B"/>
  <text x="450" y="386" class="section-label" fill="#9EFFBF" opacity="0.6" text-anchor="middle">HUMAN IN THE LOOP</text>
  <text x="450" y="404" class="node-title" fill="#F7F7F5" text-anchor="middle">Review &amp; Approve Plan</text>

  <!-- Feedback loop back to planner -->
  <path d="M 330 391 Q 305 391 305 330 Q 305 296 330 296" stroke="#FF8C69" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="3 3"/>
  <polygon points="328,293 328,299 334,296" fill="#FF8C69" opacity="0.5"/>
  <text x="272" y="345" class="node-sub" fill="#FF8C69" opacity="0.7" text-anchor="end">revise</text>

  <!-- Human Review to Parallel -->
  <line x1="450" y1="416" x2="450" y2="454" stroke="#3A3A38" stroke-width="1" opacity="0.2"/>
  <circle cx="450" cy="454" r="2.5" fill="#3A3A38" opacity="0.3"/>

  <!-- ═══════════════ PARALLEL RESEARCH BLOCK ═══════════════ -->
  <rect x="290" y="464" width="320" height="110" rx="1" fill="#F7F7F5" stroke="#1A3C2B" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Section label -->
  <text x="310" y="484" class="section-label" fill="#1A3C2B" opacity="0.35">PARALLEL BFS RESEARCH</text>

  <!-- Sub agent boxes -->
  <rect x="310" y="496" width="84" height="60" rx="1" fill="#1A3C2B"/>
  <text x="352" y="520" class="label" fill="#9EFFBF" font-size="8" text-anchor="middle">AGENT_01</text>
  <text x="352" y="536" class="node-sub" fill="#F7F7F5" text-anchor="middle" opacity="0.5">research</text>
  <text x="352" y="548" class="node-sub" fill="#F7F7F5" text-anchor="middle" opacity="0.5">+ review</text>

  <rect x="408" y="496" width="84" height="60" rx="1" fill="#1A3C2B"/>
  <text x="450" y="520" class="label" fill="#9EFFBF" font-size="8" text-anchor="middle">AGENT_02</text>
  <text x="450" y="536" class="node-sub" fill="#F7F7F5" text-anchor="middle" opacity="0.5">research</text>
  <text x="450" y="548" class="node-sub" fill="#F7F7F5" text-anchor="middle" opacity="0.5">+ review</text>

  <rect x="506" y="496" width="84" height="60" rx="1" fill="#1A3C2B"/>
  <text x="548" y="520" class="label" fill="#9EFFBF" font-size="8" text-anchor="middle">AGENT_N</text>
  <text x="548" y="536" class="node-sub" fill="#F7F7F5" text-anchor="middle" opacity="0.5">research</text>
  <text x="548" y="548" class="node-sub" fill="#F7F7F5" text-anchor="middle" opacity="0.5">+ review</text>

  <!-- Dots between agent boxes -->
  <text x="399" y="530" fill="#F7F7F5" font-size="6" opacity="0.4">·</text>
  <text x="497" y="530" fill="#F7F7F5" font-size="6" opacity="0.4">·</text>

  <!-- Parallel to Writer -->
  <line x1="450" y1="574" x2="450" y2="604" stroke="#3A3A38" stroke-width="1" opacity="0.2"/>
  <circle cx="450" cy="604" r="2.5" fill="#3A3A38" opacity="0.3"/>

  <!-- Writer -->
  <rect x="330" y="614" width="240" height="50" rx="1" fill="#F7F7F5" stroke="#3A3A38" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="330" y="614" width="4" height="50" rx="1" fill="#FF8C69"/>
  <text x="450" y="634" class="section-label" fill="#1A3C2B" opacity="0.4" text-anchor="middle">SYNTHESIS</text>
  <text x="450" y="652" class="node-title" fill="#1A3C2B" text-anchor="middle">Writer · HTML Report</text>

  <!-- Writer to Response -->
  <line x1="450" y1="664" x2="450" y2="690" stroke="#3A3A38" stroke-width="1" opacity="0.2"/>

  <!-- ═══════════════ RIGHT BRANCH: EDIT ═══════════════ -->
  <rect x="660" y="182" width="190" height="44" rx="1" fill="#F7F7F5" stroke="#3A3A38" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="660" y="182" width="4" height="44" rx="1" fill="#FF8C69"/>
  <text x="755" y="200" class="section-label" fill="#1A3C2B" opacity="0.4" text-anchor="middle">MODIFY OUTPUT</text>
  <text x="755" y="216" class="node-title" fill="#1A3C2B" text-anchor="middle">Editor Node</text>

  <!-- Edit down line -->
  <line x1="755" y1="226" x2="755" y2="690" stroke="#3A3A38" stroke-width="1" opacity="0.15" stroke-dasharray="4 4"/>

  <!-- ═══════════════ CONVERGENCE: RESPONSE ═══════════════ -->
  <!-- Horizontal convergence line -->
  <line x1="145" y1="700" x2="755" y2="700" stroke="#3A3A38" stroke-width="1" opacity="0.15"/>
  <line x1="450" y1="700" x2="450" y2="720" stroke="#3A3A38" stroke-width="1" opacity="0.2"/>

  <!-- Response -->
  <rect x="345" y="726" width="210" height="40" rx="1" fill="#1A3C2B"/>
  <text x="450" y="750" class="node-title" fill="#F7F7F5" text-anchor="middle">Response · Stream</text>

  <!-- Response to Memory -->
  <line x1="450" y1="766" x2="450" y2="782" stroke="#3A3A38" stroke-width="1" opacity="0.2"/>

  <!-- Memory -->
  <rect x="370" y="786" width="160" height="26" rx="1" fill="#F7F7F5" stroke="#3A3A38" stroke-width="1" stroke-opacity="0.15"/>
  <text x="450" y="803" class="label" fill="#1A3C2B" opacity="0.35" font-size="8" text-anchor="middle">MEMORY · LONG TERM</text>

</svg>
